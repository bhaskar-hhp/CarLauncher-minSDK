name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install apktool
        run: |
          curl -sL "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -o /usr/local/bin/apktool
          curl -sL "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" -o /usr/local/bin/apktool.jar
          chmod +x /usr/local/bin/apktool

      - name: Build APK with apktool
        run: |
          mkdir -p build
          apktool b . -o build/unsigned.apk

      - name: Zipalign and sign
        run: |
          BT=$(ls -d $ANDROID_HOME/build-tools/*/ | head -1)
          echo "Using build-tools: $BT"
          ${BT}zipalign -f -p 4 build/unsigned.apk build/aligned.apk
          keytool -genkey -v -keystore build/debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug" 2>/dev/null
          ${BT}apksigner sign --ks build/debug.keystore --ks-pass pass:android --key-pass pass:android build/aligned.apk
          cp build/aligned.apk build/output.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/output.apk
